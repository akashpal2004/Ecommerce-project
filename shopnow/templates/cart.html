{% extends "menu.html" %}
{% block content %}

<style>

body{
    background:#f5f7fa;
}

/* Title */
.page-title{
    color:#243b55;
    font-weight:600;
}

/* Table Card */
.cart-box{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* Table Header Theme */
.table thead{
    background:linear-gradient(90deg,#141e30,#243b55);
    color:white;
}

/* Buttons */
.btn-warning{
    background:#f0ad4e;
    border:none;
}

.btn-success{
    background:#28a745;
}

.btn-primary{
    background:#243b55;
    border:none;
}

.btn-primary:hover{
    background:#141e30;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4 page-title">Your Shopping Cart 🛒</h2>

<div class="cart-box">

<table class="table table-bordered text-center">

<thead>
<tr>
<th>Product</th>
<th>Quantity</th>
<th>Price</th>
<th>Total</th>
</tr>
</thead>

<tbody id="productTable"></tbody>

</table>

<div class="text-right">

<button class="btn btn-primary mr-2" onclick="continueShopping()">
Continue Shopping
</button>

<button class="btn btn-success" onclick="checkout()">
Checkout
</button>

</div>

</div>

</div>

<!-- Modal -->
<div class="modal fade" id="successModal">

<div class="modal-dialog">
<div class="modal-content text-center">

<div class="modal-header">
<h5 class="modal-title">Order Status</h5>
<button class="close" data-dismiss="modal">&times;</button>
</div>

<div class="modal-body">
<h3>🎉 Congratulations!</h3>
<p>Your order has been placed successfully.</p>
</div>

<div class="modal-footer">
<button class="btn btn-primary" onclick="continueShopping()">Continue Shopping</button>
</div>

</div>
</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let table = document.getElementById("productTable");

function displayCart(){

table.innerHTML = "";
let grandTotal = 0;

cart.forEach(function(item,index){

let total = item.qty * item.price;
grandTotal += total;

let row = `<tr>

<td>${item.name}</td>

<td>
<button class="btn btn-warning btn-sm" onclick="decrementQty(${index})">-</button>
<span class="mx-2">${item.qty}</span>
<button class="btn btn-success btn-sm" onclick="incrementQty(${index})">+</button>
</td>

<td>₹${item.price}</td>

<td>₹${total}</td>

</tr>`;

table.innerHTML += row;

});

let totalRow = `<tr>

<td colspan="3"><b>Grand Total</b></td>

<td><b>₹${grandTotal}</b></td>

</tr>`;

table.innerHTML += totalRow;

}

function incrementQty(index){

cart[index].qty += 1;

localStorage.setItem("cart", JSON.stringify(cart));

displayCart();

}

function decrementQty(index){

cart[index].qty -= 1;

if(cart[index].qty <= 0){
cart.splice(index,1);
}

localStorage.setItem("cart", JSON.stringify(cart));

displayCart();

}

function continueShopping(){
window.location.href = "index.html";
}

function checkout(){

if(cart.length === 0){
alert("Cart is empty!");
return;
}

$('#successModal').modal('show');

localStorage.removeItem("cart");

cart = [];

displayCart();

}

displayCart();

</script>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

{% endblock %}
